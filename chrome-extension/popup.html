<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafaf8;
      color: #1a1a1a;
    }
    .header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid #ebebeb;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo { font-size: 20px; }
    .title { font-size: 14px; font-weight: 600; }
    .subtitle { font-size: 11px; color: #888; }

    .status-row {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #ebebeb;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }
    .dot.active { background: #4a7c59; }
    .dot.connected { background: #4a7c59; }
    .status-text { font-size: 12px; color: #555; }

    .actions { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
    button {
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid #e5e5e5;
      background: #fff;
      color: #1a1a1a;
      text-align: left;
      transition: background 0.12s;
      width: 100%;
    }
    button:hover { background: #f0f0f0; }
    button.primary {
      background: #4a7c59;
      color: #fff;
      border-color: #4a7c59;
      font-weight: 600;
    }
    button.primary:hover { background: #3d6a4a; }

    .footer {
      padding: 10px 16px;
      font-size: 10px;
      color: #bbb;
      border-top: 1px solid #ebebeb;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">⚓</span>
    <div>
      <div class="title">ADHD Anchor</div>
      <div class="subtitle">Focus buddy</div>
    </div>
  </div>

  <div class="status-row">
    <div class="dot" id="session-dot"></div>
    <span class="status-text" id="session-status">No active session</span>
  </div>

  <div class="status-row">
    <div class="dot" id="ws-dot"></div>
    <span class="status-text" id="ws-status">Connecting to backend…</span>
  </div>

  <div class="actions">
    <button class="primary" id="btn-start-session">Start focus session</button>
    <button id="btn-reconnect">Reconnect to backend</button>
  </div>

  <div class="footer">Anchor is active on every tab</div>

  <script src="popup.js"></script>
</body>
</html>
